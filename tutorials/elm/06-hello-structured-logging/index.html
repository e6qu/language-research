<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Structured Logging</title>
</head>
<body>
    <div id="app"></div>
    <script src="main.js"></script>
    <script>
    var app = Elm.Main.init({ node: document.getElementById("app") });
    app.ports.log.subscribe(function(data) { console.log(JSON.stringify(data)); });
    </script>
</body>
</html>
