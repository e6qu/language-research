<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>05 - Hello Concurrency</title></head>
<body>
  <h1>Rust-WASM Parallel Fetch</h1>
  <div id="output" style="white-space:pre; font-family:monospace;">Loading...</div>
  <script type="module">
    import init, { parallel_fetch } from './pkg/hello_concurrency.js';
    async function run() {
      await init();
      try {
        await parallel_fetch('https://jsonplaceholder.typicode.com/todos', 5);
      } catch (e) {
        document.getElementById('output').textContent = 'Error: ' + e;
      }
    }
    run();
  </script>
</body>
</html>
