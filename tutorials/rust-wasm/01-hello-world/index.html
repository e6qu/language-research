<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>01 - Hello World</title></head>
<body>
  <h1>Rust-WASM Hello World</h1>
  <div id="output"></div>
  <script type="module">
    import init, { greet } from './pkg/hello_world.js';
    async function run() {
      await init();
      document.getElementById('output').textContent = greet('World');
    }
    run();
  </script>
</body>
</html>
