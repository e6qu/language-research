name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-binaries:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        lang:
          - elixir
          - erlang
          - elm
          - lua
          - tcl
          - perl
          - raku
          - rust
          - rust-wasm
          - golang
          - java
          - java-springboot
          - java-quarkus
          - clojure
          - zig
          - dlang
          - c3
          - scheme
          - common-lisp
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build tutorial environment
        uses: docker/build-push-action@v6
        with:
          context: tutorials/${{ matrix.lang }}
          file: tutorials/${{ matrix.lang }}/Dockerfile.tutorial-env
          tags: tutorial-${{ matrix.lang }}:ci
          load: true
          cache-from: type=gha,scope=${{ matrix.lang }}
        continue-on-error: ${{ matrix.lang == 'c3' }}

      - name: Build fat binaries
        run: |
          mkdir -p artifacts
          docker run --rm \
            -v "${{ github.workspace }}/tutorials/${{ matrix.lang }}":/tutorials \
            -v "${{ github.workspace }}/artifacts":/artifacts \
            -w /tutorials \
            tutorial-${{ matrix.lang }}:ci \
            bash -c '
              for d in [0-9]*/; do
                name=$(basename "$d")
                echo "=== fatbin ${{ matrix.lang }}/$name ==="
                make -C "$d" fatbin 2>&1 || true
              done
            '

      - name: Collect binary size report
        run: |
          echo "${{ matrix.lang }}" > artifacts/${{ matrix.lang }}-sizes.txt
          docker run --rm \
            -v "${{ github.workspace }}/tutorials/${{ matrix.lang }}":/tutorials \
            -w /tutorials \
            tutorial-${{ matrix.lang }}:ci \
            bash -c 'for d in [0-9]*/; do make -C "$d" fatbin 2>&1; done' \
            >> artifacts/${{ matrix.lang }}-sizes.txt 2>&1 || true

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.lang }}
          path: artifacts/
          retention-days: 30

  create-release:
    runs-on: ubuntu-latest
    needs: [build-binaries]
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: ./all-artifacts

      - name: Generate size report
        run: |
          echo "# Binary Size Report" > release-notes.md
          echo "" >> release-notes.md
          echo "Built from 19 languages × 9 tutorials = 171 artifacts" >> release-notes.md
          echo "" >> release-notes.md
          echo "| Language | Details |" >> release-notes.md
          echo "|---|---|" >> release-notes.md
          for f in ./all-artifacts/*-sizes.txt; do
            lang=$(head -1 "$f")
            echo "| $lang | $(wc -l < "$f") lines |" >> release-notes.md
          done
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./all-artifacts/*-sizes.txt
          body_path: release-notes.md
          generate_release_notes: true
